_format_version: "3.0"
_transform: true

services:
  - name: relayer-api
    url: http://host.docker.internal:8080
    routes:
      - name: api-routes
        paths:
          - /v1
        strip_path: false

plugins:
  # Enable global rate limiting to practice API gateway traffic management
  - name: rate-limiting
    config:
      second: 5
      hour: 10000
      policy: local
