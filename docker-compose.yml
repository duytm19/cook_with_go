version: '3.8'

services:
  # LocalStack for AWS KMS, SQS, DynamoDB
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=kms,sqs,dynamodb
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
    volumes:
      - "./localstack-init:/etc/localstack/init/ready.d"

  # Ethereum Local Dev Node (Anvil from Foundry)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    ports:
      - "8545:8545"
    entrypoint: ["anvil", "--host", "0.0.0.0"]

  # Relational Database for Wallet Metadata
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=relayer_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234567
    volumes:
      - "./db-init:/docker-entrypoint-initdb.d"

  # Kong API Gateway (DB-less mode)
kong:
    image: kong:3.6-alpine
    container_name: kong-gateway
    ports:
      - "8000:8000"       # API Ingress Gateway Port
      - "127.0.0.1:8001:8001" # Admin API 
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=0.0.0.0:8001 # <--- QUAN TRỌNG: Phải có dòng này để Kong mở cổng Admin nội bộ
      - KONG_LOG_LEVEL=notice
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
    volumes:
      - "./api/kong.yml:/usr/local/kong/declarative/kong.yml" # Hãy chắc chắn đường dẫn tới file kong.yml của bạn là đúng
    extra_hosts:
      - "host.docker.internal:host-gateway" # Cực kỳ chuẩn! Dòng này giúp Kong trong Docker gọi được app Go chạy ở ngoài máy thật.